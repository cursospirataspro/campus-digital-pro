# =============================================================================
#  nginx.conf — Configuración de Nginx para el reproductor de cursos
#
#  Instalación:
#    sudo cp nginx.conf /etc/nginx/sites-available/reproductor
#    sudo ln -s /etc/nginx/sites-available/reproductor /etc/nginx/sites-enabled/
#    # Editar "tudominio.com" con tu dominio real
#    sudo nginx -t && sudo systemctl reload nginx
#
#  SSL (después de apuntar el dominio a este servidor):
#    sudo certbot --nginx -d tudominio.com
# =============================================================================

# Redirige HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com;

    # Certbot necesita acceder aquí para verificar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com;

    # --- Certificados SSL (Certbot los llena automáticamente) ---
    # ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Seguridad básica ---
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # --- Tamaño máximo de subida (para videos grandes) ---
    client_max_body_size 20G;
    client_body_timeout 300s;

    # --- Timeout para procesar videos largos ---
    proxy_read_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;

    # --- Logs ---
    access_log /var/log/nginx/reproductor-access.log;
    error_log  /var/log/nginx/reproductor-error.log;

    # --- Archivos estáticos: Nginx los sirve directamente (más rápido) ---
    location /js/ {
        alias /opt/reproductor/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # --- Segmentos HLS locales: No cachear (cada alumno tiene su clave) ---
    location /api/proxy/segment/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;  # streaming: no buffer en memoria
    }

    # --- Todo lo demás va al servidor Node.js ---
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

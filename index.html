<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor</title>
    <style>
        :root {
            --c-primary: #e63946;
            --c-primary-h: #ff4d5a;
            --c-bg: #000;
            --c-surface: #111;
            --c-border: #2a2a2a;
            --c-text: #f0f0f0;
            --c-muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: var(--c-bg); font-family: "Segoe UI", Tahoma, sans-serif; color: var(--c-text); overflow: hidden; }
        body { display: flex; flex-direction: column; }

        /* ---- PLAYER ---- */
        #player-container {
            flex: 1; position: relative;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; min-height: 0;
        }
        video#hls-video {
            width: 100%; height: 100%;
            max-height: 100%; object-fit: contain; background: #000;
        }

        /* ---- WATERMARK VISIBLE (device fingerprint) ---- */
        #watermark-overlay {
            position: absolute;
            color: rgba(255,255,255,0.22);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-size: 13px; font-weight: 600;
            font-family: monospace; letter-spacing: 1px;
            pointer-events: none; z-index: 20;
            white-space: nowrap; user-select: none;
            transition: top 10s ease-in-out, left 10s ease-in-out;
        }
        /* ---- WATERMARK FORENSE (invisble al ojo) ---- */
        #watermark-forensic {
            position: absolute;
            color: rgba(200,200,200,0.06);
            font-size: 8px; font-weight: 400;
            font-family: monospace; letter-spacing: 0.5px;
            pointer-events: none; z-index: 19;
            white-space: nowrap; user-select: none;
            transition: top 60s ease-in-out, left 60s ease-in-out;
        }

        /* ---- LOADING / ERROR ---- */
        #loading-overlay {
            position: absolute; inset: 0; background: #000; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 14px;
        }
        #loading-overlay.hidden { display: none; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.12);
            border-top-color: var(--c-primary);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-overlay p { color: var(--c-muted); font-size: 0.82rem; }
        #player-error {
            position: absolute; inset: 0; z-index: 15;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; background: #000;
        }
        #player-error p { color: #ff6b6b; font-size: 0.9rem; text-align: center; padding: 0 24px; }
        #player-error button {
            margin-top: 8px; padding: 8px 22px;
            background: var(--c-primary); color: #fff;
            border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }

        /* ---- STATUS BAR (oculta) ---- */
        #status-bar { display: none; }

        @media (max-width: 480px) {
            #watermark-overlay { font-size: 10px; }
        }

        /* Ocultar botón de overflow/descarga de los controles nativos */
        video::-webkit-media-controls-overflow-button { display: none !important; }

        /* Panel de calidad */
        #settings-panel {
            position: absolute; bottom: 60px; right: 10px; z-index: 26;
            background: rgba(15,15,15,0.97); border: 1px solid rgba(255,255,255,0.13);
            border-radius: 10px; width: 160px;
            backdrop-filter: blur(8px); box-shadow: 0 6px 28px rgba(0,0,0,0.7);
            display: none; flex-direction: column; overflow: hidden;
        }
        #settings-panel.open { display: flex; }
        .sp-section-title {
            font-size: 0.65rem; color: var(--c-muted); text-transform: uppercase;
            letter-spacing: 0.08em; padding: 10px 14px 4px;
            font-family: 'Segoe UI', sans-serif; user-select: none;
        }
        .sp-option {
            background: none; border: none; color: #ddd;
            font-size: 0.82rem; padding: 8px 14px; text-align: left;
            cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; font-family: 'Segoe UI', sans-serif;
            transition: background 0.12s;
        }
        .sp-option:hover { background: rgba(255,255,255,0.08); }
        .sp-option.active { color: var(--c-primary); }
        .sp-option .sp-check { opacity: 0; font-size: 0.75rem; }
        .sp-option.active .sp-check { opacity: 1; }

        /* Big play button en centro */
        #big-play {
            position: absolute; top: 50%; left: 50%; z-index: 21;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.55); border: none;
            width: 68px; height: 68px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, opacity 0.2s;
            backdrop-filter: blur(4px);
        }
        #big-play:hover { background: rgba(230,57,70,0.8); }
        #big-play svg { width: 32px; height: 32px; fill: #fff; margin-left: 4px; }
        #big-play.hidden { opacity: 0; pointer-events: none; }

        /* Selector de calidad en esquina superior derecha */
        #settings-btn {
            position: absolute; top: 10px; right: 12px; z-index: 25;
            background: rgba(0,0,0,0.5); border: none;
            color: #fff; font-size: 1rem;
            width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; display: none; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.25s;
        }
        #settings-btn:hover { background: rgba(60,60,60,0.9); transform: rotate(30deg); }
    </style>
</head>
<body>

<div id="player-container">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-msg">Cargando...</p>
    </div>
    <div id="player-error">
        <p id="player-error-msg">No se pudo cargar el video.</p>
        <button onclick="location.reload()">Reintentar</button>
    </div>
    <video id="hls-video" playsinline controls
        controlslist="nodownload noremoteplayback"
        disablePictureInPicture></video>

    <div id="watermark-overlay"></div>
    <div id="watermark-forensic"></div>

    <!-- Engranaje calidad (esquina superior derecha) -->
    <button id="settings-btn" title="Calidad">&#9881;</button>
    <div id="settings-panel"></div>

<div id="status-bar">
    <span id="status-text">Iniciando...</span>
    <span style="opacity:0.4">●</span>
</div>

<script src="/js/hls.min.js"></script>
<script>
'use strict';

const STATE = {
    token: null, mediaToken: null, videoId: null,
    deviceId: null, sessionId: null, hls: null
};

const $  = id => document.getElementById(id);
const setStatus     = t => $('status-text').textContent = t;
const showLoading   = m => { $('loading-msg').textContent = m || 'Cargando...'; $('loading-overlay').classList.remove('hidden'); };
const hideLoading   = () => $('loading-overlay').classList.add('hidden');
const showError     = m => { hideLoading(); $('player-error-msg').textContent = m; $('player-error').style.display = 'flex'; };

function parseJwt(token) {
    try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
    catch { return {}; }
}
function saveSession(t) { try { sessionStorage.setItem('_rt', t); } catch {} }
function loadSession()  { try { return sessionStorage.getItem('_rt'); } catch { return null; } }

// ================================================================
//  DEVICE FINGERPRINT — identifica el dispositivo del espectador
// ================================================================
async function getDeviceFingerprint() {
    const parts = [];
    // Datos del navegador/sistema
    parts.push(navigator.userAgent || '');
    parts.push(navigator.language || '');
    parts.push(navigator.platform || '');
    parts.push(`${screen.width}x${screen.height}x${screen.colorDepth}`);
    parts.push(String(new Date().getTimezoneOffset()));
    parts.push(String(navigator.hardwareConcurrency || 0));

    // Canvas fingerprint (diferente por navegador + GPU + fuentes instaladas)
    try {
        const cv = document.createElement('canvas');
        cv.width = 220; cv.height = 50;
        const cx = cv.getContext('2d');
        cx.fillStyle = '#1a1a2e';   cx.fillRect(0, 0, 220, 50);
        cx.font = 'bold 16px Arial'; cx.fillStyle = '#e63946';
        cx.fillText('Device-ID:drm', 4, 22);
        cx.font = '11px monospace'; cx.fillStyle = 'rgba(100,200,80,0.85)';
        cx.fillText('\u29BF\u29BF\u29BF secure', 8, 40);
        parts.push(cv.toDataURL());
    } catch { parts.push('no-canvas'); }

    // WebGL renderer (identifica la GPU)
    try {
        const gl = document.createElement('canvas').getContext('webgl');
        if (gl) {
            const ext = gl.getExtension('WEBGL_debug_renderer_info');
            if (ext) {
                parts.push(gl.getParameter(ext.UNMASKED_VENDOR_WEBGL)   || '');
                parts.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '');
            }
        }
    } catch { parts.push('no-webgl'); }

    // SHA-256 → 6 caracteres alfanuméricos (base36 de los primeros 4 bytes)
    const buf  = new TextEncoder().encode(parts.join('|'));
    const hash = await crypto.subtle.digest('SHA-256', buf);
    const hashArr = Array.from(new Uint8Array(hash));
    const n = ((hashArr[0] << 24) | (hashArr[1] << 16) | (hashArr[2] << 8) | hashArr[3]) >>> 0;
    const CHARS = '0123456789abcdefghijklmnopqrstuvwxyz';
    let id = ''; let rem = n;
    while (rem > 0) { id = CHARS[rem % 36] + id; rem = Math.floor(rem / 36); }
    return id.padStart(6, '0').slice(-6);
}

// ================================================================
//  INICIO AUTOMÁTICO
// ================================================================
window.addEventListener('DOMContentLoaded', async () => {
    const params  = new URLSearchParams(window.location.search);
    STATE.videoId = params.get('v') || params.get('videoId') || null;

    if (!STATE.videoId) {
        showError('No se especificó un video. Usa ?v=<videoId> en la URL.');
        return;
    }

    showLoading('Identificando dispositivo...');

    // 1. Computar fingerprint del dispositivo
    try {
        STATE.deviceId = await getDeviceFingerprint();
    } catch {
        // Si falla (muy raro), generar ID temporal de 6 chars
        const r = crypto.getRandomValues(new Uint8Array(4));
        const n = ((r[0] << 24) | (r[1] << 16) | (r[2] << 8) | r[3]) >>> 0;
        const C = '0123456789abcdefghijklmnopqrstuvwxyz';
        let id = ''; let rem = n;
        while (rem > 0) { id = C[rem % 36] + id; rem = Math.floor(rem / 36); }
        STATE.deviceId = id.padStart(6, '0').slice(-6);
    }

    // 2. Obtener token de sesión (reutilizar si no expiró)
    const cached = loadSession();
    if (cached) {
        const p   = parseJwt(cached);
        const now = Math.floor(Date.now() / 1000);
        // Reutilizar solo si el device ID coincide y el token no expiró
        if (p.exp && p.exp > now + 30 && p.deviceId === STATE.deviceId) {
            STATE.token = cached;
        }
    }

    if (!STATE.token) {
        showLoading('Preparando reproducción...');
        try {
            const r = await fetch('/api/auth/auto?did=' + encodeURIComponent(STATE.deviceId));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const { token } = await r.json();
            STATE.token = token;
            saveSession(token);
        } catch (err) {
            showError('Error al iniciar sesión: ' + err.message);
            return;
        }
    }

    await loadAndPlayVideo(STATE.videoId);
});

// ================================================================
//  CARGA Y REPRODUCCIÓN
// ================================================================
async function loadAndPlayVideo(videoId) {
    try {
        // Cerrar sesión anterior si existe
        if (STATE.sessionId) {
            stopHeartbeat();
            sendEnd(STATE.sessionId);
            STATE.sessionId = null;
        }

        setStatus('Obteniendo licencia...');
        const r = await fetch('/api/video/' + encodeURIComponent(videoId) + '/play', {
            headers: { Authorization: 'Bearer ' + STATE.token }
        });
        if (!r.ok) {
            const e = await r.json().catch(() => ({}));
            throw new Error(e.error || 'Error ' + r.status);
        }
        const { manifestUrl, mediaToken, watermarkText, ttl, sessionId } = await r.json();
        STATE.mediaToken = mediaToken;
        STATE.sessionId  = sessionId || null;

        // Log de entrega
        fetch('/api/watermark/log', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ mediaToken })
        }).catch(() => {});

        scheduleTokenRefresh(ttl * 0.8 * 1000, videoId);
        startHeartbeat();
        initPlayer(manifestUrl, mediaToken);

        // watermarkText viene del servidor = STATE.deviceId (ya enviado en el token)
        startWatermark(watermarkText);
        startForensicWatermark(watermarkText);

        setStatus('\u25CF ' + STATE.deviceId);

    } catch (err) {
        console.error('[play]', err);
        showError(err.message || 'No se pudo iniciar la reproducción');
    }
}

// ================================================================
//  SECURE MANIFEST LOADER — decodifica el wrapper JSON del manifest
//  impide que extensiones de descarga identifiquen el stream HLS
// ================================================================
class SecureLoader {
    constructor(config) { this._inner = new Hls.DefaultConfig.loader(config); }
    get stats() { return this._inner.stats; }
    destroy() { this._inner.destroy(); }
    abort()   { this._inner.abort();   }
    load(context, config, callbacks) {
        const origSuccess = callbacks.onSuccess;
        this._inner.load(context, config, {
            ...callbacks,
            onSuccess(response, stats, ctx, net) {
                if (typeof response.data === 'string') {
                    try {
                        const j = JSON.parse(response.data);
                        if (j && j.d) {
                            response.data = atob(j.d.replace(/-/g, '+').replace(/_/g, '/'));
                        }
                    } catch {}
                }
                origSuccess(response, stats, ctx, net);
            }
        });
    }
}

// ================================================================
//  REPRODUCTOR HLS.js
// ================================================================
function initPlayer(manifestUrl, mediaToken) {
    const video = $('hls-video');
    if (STATE.hls) { STATE.hls.destroy(); STATE.hls = null; }

    if (Hls.isSupported()) {
        const hls = new Hls({
            loader: SecureLoader,
            xhrSetup(xhr, url) {
                if (url.includes('/api/r/') || url.includes('/api/b/') || url.includes('/api/drm/')) {
                    xhr.setRequestHeader('Authorization', 'Bearer ' + mediaToken);
                }
            },
            autoStartLoad:            true,
            startLevel:               0,
            startFragPrefetch:        true,
            maxBufferLength:          8,
            maxMaxBufferLength:       40,
            highBufferWatchdogPeriod: 2,
            enableWorker:             true,
            lowLatencyMode:           false,
            abrEwmaDefaultEstimate:   500000,
        });
        hls.loadSource(manifestUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
            hideLoading();
            buildSettingsMenu(hls, data.levels);
        });
        hls.on(Hls.Events.LEVEL_SWITCHED, () => updateSettingsMenu(hls));
        hls.on(Hls.Events.ERROR, (_, d) => {
            if (!d.fatal) return;
            if      (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
            else if (d.type === Hls.ErrorTypes.MEDIA_ERROR)   hls.recoverMediaError();
            else { showError('Error fatal. Recarga la página.'); hls.destroy(); }
        });
        STATE.hls = hls;

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = manifestUrl;
        video.addEventListener('loadedmetadata', () => { hideLoading(); }, { once: true });
        video.addEventListener('error', () => showError('Error al cargar en Safari.'), { once: true });
    } else {
        showError('Tu navegador no soporta HLS. Usa Chrome, Firefox o Safari actualizado.');
    }
}

// ================================================================
//  SETTINGS / CALIDAD
// ================================================================
let _settingsHls = null;

function buildSettingsMenu(hls, levels) {
    _settingsHls = hls;
    const btn   = $('settings-btn');
    const panel = $('settings-panel');
    if (!levels || levels.length < 1) return;

    btn.style.display = 'flex';
    btn.onclick = (e) => { e.stopPropagation(); panel.classList.toggle('open'); };
    document.addEventListener('click', () => panel.classList.remove('open'));

    renderSettingsPanel(hls, levels);
}

function renderSettingsPanel(hls, levels) {
    const panel = $('settings-panel');
    panel.innerHTML = '';

    // --- CALIDAD ---
    const qt = document.createElement('div');
    qt.className = 'sp-section-title';
    qt.textContent = 'Calidad';
    panel.appendChild(qt);

    const autoOpt = document.createElement('button');
    autoOpt.className = 'sp-option' + (hls.autoLevelEnabled ? ' active' : '');
    autoOpt.innerHTML = 'Auto <span class="sp-check">✓</span>';
    autoOpt.onclick = (e) => { e.stopPropagation(); hls.currentLevel = -1; updateSettingsMenu(hls); };
    panel.appendChild(autoOpt);

    [...levels].reverse().forEach((lvl, rIdx) => {
        const idx = levels.length - 1 - rIdx;
        const h   = lvl.height || Math.round((lvl.width || 0) * 9 / 16);
        const lbl = h ? h + 'p' : Math.round(lvl.bitrate / 1000) + ' kbps';
        const opt = document.createElement('button');
        const isActive = !hls.autoLevelEnabled && hls.currentLevel === idx;
        opt.className = 'sp-option' + (isActive ? ' active' : '');
        opt.innerHTML = lbl + ' <span class="sp-check">✓</span>';
        opt.onclick = (e) => { e.stopPropagation(); hls.currentLevel = idx; updateSettingsMenu(hls); };
        panel.appendChild(opt);
    });
}

function updateSettingsMenu(hls) {
    if (!hls) return;
    renderSettingsPanel(hls, hls.levels);
}

// ================================================================
//  REFRESCO DE TOKEN
// ================================================================
let refreshTimer = null;
function scheduleTokenRefresh(delayMs, videoId) {
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = setTimeout(async () => {
        try {
            const r = await fetch('/api/auth/auto?did=' + encodeURIComponent(STATE.deviceId));
            if (r.ok) {
                const { token } = await r.json();
                STATE.token = token;
                saveSession(token);
                await loadAndPlayVideo(videoId);
            }
        } catch(e) { console.warn('[refresh]', e.message); }
    }, delayMs);
}

// ================================================================
//  WATERMARK VISIBLE (device fingerprint — se mueve cada 10s)
// ================================================================
let wmTimer = null;
function startWatermark(text) {
    if (!text) return;
    const wm = $('watermark-overlay');
    wm.textContent = text;
    placeWatermark();
    wmTimer = setInterval(placeWatermark, 10000);
}
function placeWatermark() {
    const wm = $('watermark-overlay'), c = $('player-container');
    const maxX = Math.max(0, c.clientWidth  - wm.offsetWidth  - 20);
    const maxY = Math.max(0, c.clientHeight - wm.offsetHeight - 20);
    wm.style.left = (10 + Math.random() * maxX) + 'px';
    wm.style.top  = (10 + Math.random() * maxY) + 'px';
}

// ================================================================
//  WATERMARK FORENSE (casi invisible, rota entre las 4 esquinas)
// ================================================================
let fwTimer = null;
function startForensicWatermark(fp) {
    if (!fp) return;
    const wm = $('watermark-forensic');
    const hour = Math.floor(Date.now() / 3600000).toString(16);
    wm.textContent = fp.slice(0, 32) + '\u00B7' + hour;
    placeForensic(fp);
    fwTimer = setInterval(() => placeForensic(fp), 60000);
}
function placeForensic(fp) {
    const wm = $('watermark-forensic');
    const corners = [
        { top: '8px',    left: '8px',  right: '',    bottom: '' },
        { top: '8px',    right: '8px', left: '',     bottom: '' },
        { bottom: '28px', left: '8px', top: '',      right:  '' },
        { bottom: '28px', right: '8px', top: '',     left:   '' },
    ];
    const idx = (Math.floor(Date.now() / 60000) + (fp.charCodeAt(0) || 0)) % 4;
    const c = corners[idx];
    Object.assign(wm.style, { top: c.top, left: c.left, right: c.right, bottom: c.bottom });
}

// ================================================================
//  HEARTBEAT DE SESIÓN
// ================================================================
let heartbeatTimer = null;
function startHeartbeat() {
    stopHeartbeat();
    heartbeatTimer = setInterval(async () => {
        if (!STATE.sessionId || !STATE.mediaToken) return;
        try {
            const r = await fetch('/api/session/heartbeat', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ sessionId: STATE.sessionId, mediaToken: STATE.mediaToken })
            });
            const d = await r.json().catch(() => ({}));
            if (!r.ok || d.revoked) {
                const v = $('hls-video');
                if (v && !v.paused) v.pause();
                stopHeartbeat();
                const msg = d.reason === 'token_expired'     ? 'Tu sesión expiró.' :
                            d.reason === 'session_not_found' ? 'Sesión cerrada.' : 'Sesión terminada.';
                showError(msg + ' Recarga la página para continuar.');
            }
        } catch {}
    }, 30000);
}
function stopHeartbeat() { if (heartbeatTimer) clearInterval(heartbeatTimer); heartbeatTimer = null; }

function sendEnd(sessionId) {
    const body = JSON.stringify({ sessionId });
    if (navigator.sendBeacon) {
        navigator.sendBeacon('/api/session/end', new Blob([body], { type: 'application/json' }));
    } else {
        fetch('/api/session/end', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body, keepalive: true }).catch(() => {});
    }
}
window.addEventListener('pagehide', () => { if (STATE.sessionId) sendEnd(STATE.sessionId); });
</script>
</body>
</html>
